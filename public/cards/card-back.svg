<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 680" role="img" aria-label="Card back">
	<defs>
		<radialGradient id="velvet" cx="50%" cy="44%" r="68%">
			<stop offset="0%" stop-color="#2a1848" />
			<stop offset="45%" stop-color="#1a0f2e" />
			<stop offset="100%" stop-color="#0d0818" />
		</radialGradient>
		<radialGradient id="gold-shine" cx="50%" cy="38%" r="55%">
			<stop offset="0%" stop-color="#d9b96e" stop-opacity="0.12" />
			<stop offset="100%" stop-color="#d9b96e" stop-opacity="0" />
		</radialGradient>
		<linearGradient id="gold-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#f0e6c8" />
			<stop offset="35%" stop-color="#d9b96e" />
			<stop offset="65%" stop-color="#b89a4a" />
			<stop offset="100%" stop-color="#8f7340" />
		</linearGradient>
		<pattern id="star-dust" width="24" height="24" patternUnits="userSpaceOnUse">
			<circle cx="4" cy="6" r="0.6" fill="#ffffff" opacity="0.08" />
			<circle cx="18" cy="14" r="0.45" fill="#65e6ff" opacity="0.06" />
			<circle cx="12" cy="20" r="0.5" fill="#ffffff" opacity="0.05" />
		</pattern>
		<filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="2" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>

	<!-- Base velvet -->
	<rect width="400" height="680" fill="#0a0612" />
	<rect x="8" y="8" width="384" height="664" rx="6" ry="6" fill="url(#velvet)" />
	<rect x="8" y="8" width="384" height="664" rx="6" ry="6" fill="url(#star-dust)" />
	<rect x="8" y="8" width="384" height="664" rx="6" ry="6" fill="url(#gold-shine)" />

	<!-- Outer gold frame -->
	<rect
		x="20"
		y="20"
		width="360"
		height="640"
		rx="4"
		ry="4"
		fill="none"
		stroke="url(#gold-stroke)"
		stroke-width="2.5"
	/>
	<rect
		x="32"
		y="32"
		width="336"
		height="616"
		rx="3"
		ry="3"
		fill="none"
		stroke="url(#gold-stroke)"
		stroke-width="1"
		opacity="0.55"
	/>

	<!-- Corner ornaments -->
	<g stroke="url(#gold-stroke)" stroke-width="1.5" fill="none" opacity="0.85">
		<path d="M32 32 L56 32 L32 56" />
		<path d="M368 32 L344 32 L368 56" />
		<path d="M32 648 L56 648 L32 624" />
		<path d="M368 648 L344 648 L368 624" />
	</g>

	<g transform="translate(200 318)" filter="url(#soft-glow)">
		<!-- Zodiac / celestial outer ring -->
		<circle r="168" fill="none" stroke="url(#gold-stroke)" stroke-width="1.5" opacity="0.9" />
		<circle r="152" fill="none" stroke="url(#gold-stroke)" stroke-width="0.75" opacity="0.45" stroke-dasharray="4 6" />

		<!-- Moon phases (12 ticks) -->
		<g fill="url(#gold-stroke)" opacity="0.75">
			<circle cx="0" cy="-158" r="5" />
			<circle cx="79" cy="-137" r="4" opacity="0.7" />
			<circle cx="137" cy="-79" r="5" />
			<circle cx="158" cy="0" r="4" opacity="0.7" />
			<circle cx="137" cy="79" r="5" />
			<circle cx="79" cy="137" r="4" opacity="0.7" />
			<circle cx="0" cy="158" r="5" />
			<circle cx="-79" cy="137" r="4" opacity="0.7" />
			<circle cx="-137" cy="79" r="5" />
			<circle cx="-158" cy="0" r="4" opacity="0.7" />
			<circle cx="-137" cy="-79" r="5" />
			<circle cx="-79" cy="-137" r="4" opacity="0.7" />
		</g>

		<!-- Sacred geometry inner rings -->
		<circle r="118" fill="#1a0f2e" fill-opacity="0.55" stroke="url(#gold-stroke)" stroke-width="1.25" />
		<circle r="92" fill="none" stroke="url(#gold-stroke)" stroke-width="1" opacity="0.65" />

		<!-- Hexagram -->
		<g stroke="url(#gold-stroke)" stroke-width="1.5" fill="none" opacity="0.85">
			<polygon points="0,-72 62.4,36 -62.4,36" />
			<polygon points="0,72 -62.4,-36 62.4,-36" />
		</g>

		<!-- Inner eye / third eye motif -->
		<ellipse cx="0" cy="0" rx="28" ry="18" fill="none" stroke="url(#gold-stroke)" stroke-width="1.25" />
		<circle r="8" fill="#6f5bff" fill-opacity="0.35" stroke="url(#gold-stroke)" stroke-width="1" />
		<circle r="3" fill="#65e6ff" fill-opacity="0.9" />

		<!-- Radiating lines -->
		<g stroke="url(#gold-stroke)" stroke-width="0.75" opacity="0.35">
			<line x1="0" y1="-92" x2="0" y2="-118" />
			<line x1="0" y1="92" x2="0" y2="118" />
			<line x1="-92" y1="0" x2="-118" y2="0" />
			<line x1="92" y1="0" x2="118" y2="0" />
			<line x1="65" y1="-65" x2="83" y2="-83" />
			<line x1="-65" y1="65" x2="-83" y2="83" />
			<line x1="65" y1="65" x2="83" y2="83" />
			<line x1="-65" y1="-65" x2="-83" y2="-83" />
		</g>
	</g>

	<!-- Runes / symbols on vertical axis -->
	<g fill="url(#gold-stroke)" opacity="0.5" font-family="serif" font-size="14" text-anchor="middle">
		<text x="200" y="108">☽</text>
		<text x="200" y="598">☾</text>
		<text x="72" y="345" font-size="12">✦</text>
		<text x="328" y="345" font-size="12">✦</text>
	</g>

	<!-- Bottom sigil strip -->
	<rect x="100" y="612" width="200" height="36" rx="2" fill="#120a22" fill-opacity="0.6" stroke="url(#gold-stroke)" stroke-width="1" opacity="0.9" />
	<text
		x="200"
		y="636"
		text-anchor="middle"
		font-family="Georgia, 'Noto Serif', serif"
		font-size="11"
		font-weight="700"
		letter-spacing="0.16em"
		fill="url(#gold-stroke)"
		opacity="0.92"
	>
		TANLABS TAROT
	</text>
</svg>
